name: Build & Update

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "countries/**"
      - "scripts/generate-m3u.js"
      - "scripts/build-channels.js"
      - "scripts/generate-readme-lists.js"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build channels.json
        run: node scripts/build-channels.js

      - name: Generate M3U
        run: node scripts/generate-m3u.js

      - name: Update README
        run: node scripts/generate-readme-lists.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add channels.json channels.m3u m3u-playlists/ README.md

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Build channels.json + Update M3U playlists + README"
          git pull --rebase origin main
          git push
