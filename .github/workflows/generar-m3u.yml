name: Generar M3U

on:
  push:
    paths:
      - canales.json
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Convertir JSON a M3U
        run: node convert.js

      - name: Commit cambios
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add canales.m3u
          git diff --cached --quiet || git commit -m "Actualizar canales.m3u"
          git push